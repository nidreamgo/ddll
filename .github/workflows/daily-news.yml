name: Daily News Push

on:
  schedule:
    - cron: '0 0 * * *'   # 北京时间 08:00
    - cron: '0 9 * * *'   # 北京时间 17:00
  workflow_dispatch:

jobs:
  push-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Cache pushed URLs
        uses: actions/cache@v3
        id: cache-pushed
        with:
          path: pushed_urls.txt
          key: ${{ runner.os }}-pushed-urls
          restore-keys: |
            ${{ runner.os }}-pushed-urls

      - name: Install dependencies
        run: |
          pip install feedparser requests beautifulsoup4 pytz

      - name: Run news bot
        env:
          MAIL_USER: ${{ secrets.MAIL_USER }}
          MAIL_PASS: ${{ secrets.MAIL_PASS }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: python news_bot.py
